[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "model-clients"
version = "0.1.0"
description = "Typed model capability registry, client interfaces, and fake clients"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "pydantic>=2.7",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/model_clients"]
