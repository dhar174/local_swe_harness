[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tool-clients"
version = "0.1.0"
description = "Typed tool client interfaces (sandbox, repository, search)"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "pydantic>=2.7",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tool_clients"]
