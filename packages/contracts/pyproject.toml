[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "contracts"
version = "0.1.0"
description = "Shared typed data contracts (state, tasks, events)"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/contracts"]
