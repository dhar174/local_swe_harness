name: Bug Report
description: Report a bug in the tiered SWE agent system
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Thank you for reporting a bug! Please fill in as much detail as possible."
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - orchestrator
        - model-gateway
        - sandbox-worker
        - repo-indexer
        - routing
        - contracts
        - CI/CD
        - documentation
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `make test-unit`
        2. See error: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Tracebacks
      render: shell
